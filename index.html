<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Practice</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #08111f;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 35%),
          linear-gradient(180deg, #08111f 0%, #020617 100%);
      }

      main {
        width: min(100%, 48rem);
        padding: 3rem 1.5rem;
      }

      .panel {
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 25px 60px rgba(2, 6, 23, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 2rem 0 0;
      }

      a {
        display: block;
        padding: 1rem 1.25rem;
        border-radius: 1rem;
        text-decoration: none;
        color: inherit;
        background: rgba(15, 118, 110, 0.3);
        border: 1px solid rgba(45, 212, 191, 0.35);
      }

      a:hover,
      a:focus-visible {
        background: rgba(13, 148, 136, 0.4);
      }

      strong {
        display: block;
        margin-bottom: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Game Practice</h1>
        <p>Choose a game page to launch the practice app.</p>
        <ul>
          <li>
            <a href="./blackjack-practice/">
              <strong>Blackjack Practice</strong>
              Train basic strategy and play quick blackjack hands.
            </a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
